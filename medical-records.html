<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Records | MediCare+</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <section class="section">
    <div class="container">
      <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
          <div class="sidebar-profile">
            <div id="sidebar-avatar"></div>
            <div class="name" id="sidebar-name">—</div>
            <div class="role" id="sidebar-role">—</div>
          </div>
          <h4>Menu</h4>
          <nav class="sidebar-nav" id="sidebar-nav"></nav>
        </aside>

        <div class="dashboard-content">
          <div class="dashboard-content-header">
            <div>
              <h2>Medical Records</h2>
              <p class="text-light mb-0" id="records-page-sub">View diagnoses, symptoms and treatment plans from your visits.</p>
            </div>
          </div>

          <div class="chart-card" id="pending-records-card" style="display:none;">
            <h3>Awaiting Medical Record</h3>
            <div id="pending-records-list"></div>
          </div>

          <div id="records-list"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/records.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initPage({ requireRole: ['patient', 'doctor'], active: '' });
      renderSidebar('records');

      const user = getCurrentUser();
      if (user && user.role === 'doctor') {
        document.getElementById('pending-records-card').style.display = '';
        document.getElementById('records-page-sub').textContent = 'Review completed appointments and manage patient medical records.';
      }

      initMedicalRecordsPage();
    });

    function renderSidebar(activeKey) {
      const user = getCurrentUser();
      if (!user) return;
      document.getElementById('sidebar-avatar').innerHTML = avatarHTML(user.name, user.avatar, 64);
      document.getElementById('sidebar-name').textContent = user.name;
      document.getElementById('sidebar-role').textContent = user.role;

      const patientLinks = [
        { href: 'patient-dashboard.html', icon: '🏠', label: 'Dashboard', key: 'dashboard' },
        { href: 'my-appointments.html', icon: '📅', label: 'My Appointments', key: 'appointments' },
        { href: 'doctors.html', icon: '🩺', label: 'Find Doctors', key: 'doctors' },
        { href: 'medical-records.html', icon: '📋', label: 'Medical Records', key: 'records' },
        { href: 'prescriptions.html', icon: '💊', label: 'Prescriptions', key: 'prescriptions' },
        { href: 'billing.html', icon: '💳', label: 'Billing & Invoices', key: 'billing' },
        { href: 'calendar.html', icon: '🗓️', label: 'Calendar', key: 'calendar' },
        { href: 'reviews.html', icon: '⭐', label: 'My Reviews', key: 'reviews' },
        { href: 'notifications.html', icon: '🔔', label: 'Notifications', key: 'notifications' },
        { href: 'settings.html', icon: '⚙️', label: 'Settings', key: 'settings' }
      ];
      const doctorLinks = [
        { href: 'doctor-dashboard.html', icon: '🏠', label: 'Dashboard', key: 'dashboard' },
        { href: 'my-appointments.html', icon: '📅', label: 'Appointments', key: 'appointments' },
        { href: 'medical-records.html', icon: '📋', label: 'Medical Records', key: 'records' },
        { href: 'prescriptions.html', icon: '💊', label: 'Prescriptions', key: 'prescriptions' },
        { href: 'billing.html', icon: '💳', label: 'Billing & Invoices', key: 'billing' },
        { href: 'calendar.html', icon: '🗓️', label: 'My Schedule', key: 'calendar' },
        { href: 'notifications.html', icon: '🔔', label: 'Notifications', key: 'notifications' },
        { href: 'settings.html', icon: '⚙️', label: 'Settings', key: 'settings' }
      ];
      const links = user.role === 'doctor' ? doctorLinks : patientLinks;

      document.getElementById('sidebar-nav').innerHTML = links.map(l => `
        <a href="${l.href}" class="${l.key === activeKey ? 'active' : ''}">${l.icon} ${l.label}</a>
      `).join('');
    }
  </script>
</body>
</html>
